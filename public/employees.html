<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f6f7;
            min-height: 100vh;
        }
        .header {
            background: white;
            padding: 16px 24px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 18px; color: #1f2329; }
        .header .back { color: #3370ff; text-decoration: none; font-size: 14px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .toolbar {
            background: white;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid #dcdfe6;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn:hover { border-color: #3370ff; color: #3370ff; }
        .btn-primary {
            background: #3370ff;
            color: white;
            border-color: #3370ff;
        }
        .btn-primary:hover { background: #296eff; }
        .search-box {
            flex: 1;
            min-width: 200px;
        }
        .search-box input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
        }
        .table-container {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #e5e6eb;
            font-size: 14px;
        }
        th {
            background: #f5f6f7;
            font-weight: 500;
            color: #1f2329;
        }
        td { color: #646a73; }
        tr:hover { background: #fafbfc; }
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .tag-sv { background: #e8f1ff; color: #3370ff; }
        .tag-normal { background: #f5f6f7; color: #646a73; }
        .tag-active { background: #e6f7e6; color: #34c759; }
        .tag-inactive { background: #fff2e8; color: #ff9d4d; }
        .actions { display: flex; gap: 8px; }
        .actions button {
            padding: 4px 12px;
            font-size: 12px;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #646a73;
        }
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
        }
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #e5e6eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 { font-size: 16px; color: #1f2329; }
        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            color: #646a73;
            cursor: pointer;
        }
        .modal-body { padding: 24px; }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #1f2329;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #e5e6eb;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: #34c759; }
        .toast.error { background: #f54a45; }
        .import-area {
            border: 2px dashed #dcdfe6;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .import-area:hover { border-color: #3370ff; background: #f5f6f7; }
        .import-area input { display: none; }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>👥 员工管理</h1>
        <a href="/" class="back">← 返回首页</a>
    </div>

    <div class="container">
        <div class="toolbar">
            <button class="btn btn-primary" onclick="openModal()">+ 添加员工</button>
            <button class="btn" onclick="openImportModal()">📁 导入 Excel</button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索员工姓名、编号..." onkeyup="searchEmployees()">
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>姓名</th>
                        <th>员工编号</th>
                        <th>角色</th>
                        <th>邮箱</th>
                        <th>所属门店</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="employeeTable">
                    <tr><td colspan="7" class="empty-state">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <!-- 员工 Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">添加员工</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="employeeForm">
                    <input type="hidden" id="recordId">
                    <div class="form-row">
                        <div class="form-group">
                            <label>姓名 *</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="form-group">
                            <label>员工编号</label>
                            <input type="text" id="employeeNo" placeholder="如: 2500008">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>角色</label>
                            <select id="role">
                                <option value="普通员工">普通员工</option>
                                <option value="SV">SV</option>
                                <option value="店长">店长</option>
                                <option value="副店长">副店长</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>状态</label>
                            <select id="status">
                                <option value="在职">在职</option>
                                <option value="离职">离职</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="email" placeholder="用于接收排班通知">
                    </div>
                    <div class="form-group">
                        <label>所属门店</label>
                        <select id="storeId">
                            <option value="">请选择门店</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveEmployee()">保存</button>
            </div>
        </div>
    </div>

    <!-- 导入 Modal -->
    <div class="modal-overlay" id="importModal">
        <div class="modal">
            <div class="modal-header">
                <h3>导入员工</h3>
                <button class="modal-close" onclick="closeImportModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="import-area" onclick="document.getElementById('fileInput').click()">
                    <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFileSelect(event)">
                    <p>📁 点击或拖拽上传 Excel 文件</p>
                    <p style="font-size: 12px; color: #646a73; margin-top: 8px;">支持 .xlsx, .xls 格式</p>
                </div>
                <div style="margin-top: 16px; padding: 12px; background: #f5f6f7; border-radius: 6px; font-size: 12px; color: #646a73;">
                    <strong>Excel 格式要求：</strong><br>
                    第一行为表头，包含：姓名、员工编号、角色、邮箱、所属门店、状态<br>
                    角色可选：普通员工、SV、店长、副店长<br>
                    状态可选：在职、离职
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let employees = [];
        let stores = [];
        let currentPage = 1;
        const pageSize = 20;

        async function loadEmployees(page = 1) {
            try {
                const res = await fetch(`/api/employees?pageSize=${pageSize}&pageToken=${page > 1 ? employees[employees.length - 1]?.recordId : ''}`);
                const data = await res.json();
                
                if (data.success) {
                    employees = data.data;
                    renderTable(employees);
                }
            } catch (error) {
                console.error('加载员工失败:', error);
                showToast('加载失败', 'error');
            }
        }

        async function loadStores() {
            try {
                const res = await fetch('/api/stores?pageSize=500');
                const data = await res.json();
                if (data.success) {
                    stores = data.data;
                    const select = document.getElementById('storeId');
                    select.innerHTML = '<option value="">请选择门店</option>' + 
                        stores.map(s => `<option value="${s.storeId}">${s.name}</option>`).join('');
                }
            } catch (error) {
                console.error('加载门店失败:', error);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('employeeTable');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">暂无员工数据</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(emp => {
                const store = stores.find(s => s.storeId === emp.storeId);
                const roleClass = emp.role === 'SV' ? 'tag-sv' : 'tag-normal';
                const statusClass = emp.status === '在职' ? 'tag-active' : 'tag-inactive';
                
                return `
                    <tr>
                        <td><strong>${emp.name}</strong></td>
                        <td>${emp.employeeNo || '-'}</td>
                        <td><span class="tag ${roleClass}">${emp.role}</span></td>
                        <td>${emp.email || '-'}</td>
                        <td>${store?.name || emp.storeId || '-'}</td>
                        <td><span class="tag ${statusClass}">${emp.status}</span></td>
                        <td class="actions">
                            <button class="btn" onclick="editEmployee('${emp.recordId}')">编辑</button>
                            <button class="btn" onclick="deleteEmployee('${emp.recordId}', '${emp.name}')">删除</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function searchEmployees() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = employees.filter(emp => 
                emp.name.toLowerCase().includes(keyword) ||
                (emp.employeeNo && emp.employeeNo.toLowerCase().includes(keyword))
            );
            renderTable(filtered);
        }

        function openModal(employee = null) {
            const modal = document.getElementById('modal');
            const form = document.getElementById('employeeForm');
            
            if (employee) {
                document.getElementById('modalTitle').textContent = '编辑员工';
                document.getElementById('recordId').value = employee.recordId;
                document.getElementById('name').value = employee.name;
                document.getElementById('employeeNo').value = employee.employeeNo || '';
                document.getElementById('role').value = employee.role || '普通员工';
                document.getElementById('email').value = employee.email || '';
                document.getElementById('storeId').value = employee.storeId || '';
                document.getElementById('status').value = employee.status || '在职';
            } else {
                document.getElementById('modalTitle').textContent = '添加员工';
                form.reset();
                document.getElementById('recordId').value = '';
            }
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function openImportModal() {
            document.getElementById('importModal').classList.add('active');
        }

        function closeImportModal() {
            document.getElementById('importModal').classList.remove('active');
            document.getElementById('fileInput').value = '';
        }

        async function saveEmployee() {
            const recordId = document.getElementById('recordId').value;
            const data = {
                name: document.getElementById('name').value,
                employeeNo: document.getElementById('employeeNo').value,
                role: document.getElementById('role').value,
                email: document.getElementById('email').value,
                storeId: document.getElementById('storeId').value,
                status: document.getElementById('status').value
            };

            if (!data.name) {
                showToast('姓名不能为空', 'error');
                return;
            }

            try {
                const url = recordId ? `/api/employees/${recordId}` : '/api/employees';
                const method = recordId ? 'PUT' : 'POST';
                
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await res.json();
                if (result.success) {
                    showToast(recordId ? '员工更新成功' : '员工添加成功', 'success');
                    closeModal();
                    loadEmployees();
                } else {
                    showToast(result.message || '保存失败', 'error');
                }
            } catch (error) {
                console.error('保存员工失败:', error);
                showToast('保存失败', 'error');
            }
        }

        async function editEmployee(recordId) {
            const employee = employees.find(e => e.recordId === recordId);
            if (employee) {
                openModal(employee);
            }
        }

        async function deleteEmployee(recordId, name) {
            if (!confirm(`确定要删除员工 "${name}" 吗？`)) return;
            
            try {
                const res = await fetch(`/api/employees/${recordId}`, { method: 'DELETE' });
                const result = await res.json();
                
                if (result.success) {
                    showToast('员工删除成功', 'success');
                    loadEmployees();
                } else {
                    showToast(result.message || '删除失败', 'error');
                }
            } catch (error) {
                console.error('删除员工失败:', error);
                showToast('删除失败', 'error');
            }
        }

        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/employees/import', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await res.json();
                if (result.success) {
                    showToast(`成功导入 ${result.data.imported} 个员工`, 'success');
                    closeImportModal();
                    loadEmployees();
                } else {
                    showToast(result.message || '导入失败', 'error');
                }
            } catch (error) {
                console.error('导入失败:', error);
                showToast('导入失败', 'error');
            }
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 初始化
        loadStores();
        loadEmployees();
    </script>
</body>
</html>
