<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排班管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f6f7;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #3370ff 0%, #154ad1 100%);
            color: white;
            padding: 20px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header h1 { font-size: 24px; font-weight: 600; }
        .header p { opacity: 0.9; margin-top: 5px; font-size: 14px; }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .nav-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .nav-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .nav-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .nav-card .icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
        }
        .nav-card.blue .icon { background: #e8f1ff; }
        .nav-card.green .icon { background: #e6f7e6; }
        .nav-card.orange .icon { background: #fff2e8; }
        .nav-card.purple .icon { background: #f0e6ff; }
        .nav-card h3 { font-size: 18px; color: #1f2329; margin-bottom: 8px; }
        .nav-card p { color: #646a73; font-size: 14px; line-height: 1.5; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: 600;
            color: #3370ff;
            margin-bottom: 8px;
        }
        .stat-card .label {
            color: #646a73;
            font-size: 14px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e5e6eb;
            border-top-color: #3370ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>📅 排班管理系统</h1>
        <p>高效管理门店排班、员工信息和通知发送</p>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <div class="number" id="storeCount">-</div>
                <div class="label">门店数量</div>
            </div>
            <div class="stat-card">
                <div class="number" id="employeeCount">-</div>
                <div class="label">员工数量</div>
            </div>
            <div class="stat-card">
                <div class="number" id="scheduleCount">-</div>
                <div class="label">本周排班</div>
            </div>
        </div>

        <div class="nav-cards">
            <a href="/schedule" class="nav-card blue">
                <div class="icon">📋</div>
                <h3>排班管理</h3>
                <p>查看和编辑周排班表，支持复制上期排班、批量操作和人员分配</p>
            </a>
            <a href="/employees" class="nav-card green">
                <div class="icon">👥</div>
                <h3>员工管理</h3>
                <p>管理员工信息，支持 Excel 导入、角色设置和门店分配</p>
            </a>
            <a href="/stores" class="nav-card orange">
                <div class="icon">🏪</div>
                <h3>门店管理</h3>
                <p>维护门店信息，包括地址、联系方式和所属区域</p>
            </a>
        </div>
    </div>

    <script>
        // 获取统计数据
        async function loadStats() {
            try {
                // 获取门店数
                const storeRes = await fetch('/api/stores?pageSize=1');
                const storeData = await storeRes.json();
                if (storeData.success) {
                    document.getElementById('storeCount').textContent = storeData.total || 0;
                }

                // 获取员工数
                const empRes = await fetch('/api/employees?pageSize=1');
                const empData = await empRes.json();
                if (empData.success) {
                    document.getElementById('employeeCount').textContent = empData.total || 0;
                }

                // 获取本周排班数
                const today = new Date();
                const weekStart = new Date(today.setDate(today.getDate() - today.getDay()));
                const weekEnd = new Date(weekStart);
                weekEnd.setDate(weekEnd.getDate() + 6);
                
                const scheduleRes = await fetch(`/api/schedules?startDate=${weekStart.toISOString().split('T')[0]}&endDate=${weekEnd.toISOString().split('T')[0]}&pageSize=1`);
                const scheduleData = await scheduleRes.json();
                if (scheduleData.success) {
                    document.getElementById('scheduleCount').textContent = scheduleData.total || 0;
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }

        loadStats();
    </script>
</body>
</html>
